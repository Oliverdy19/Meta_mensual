<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Metas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155'
                        },
                        brand: {
                            glow: '#3b82f6'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }

        .progress-bar-fill {
            transition: width 1.5s ease-out, background-color 0.5s ease;
        }

        .card-hover-effect {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover-effect:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .glass-header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ── RESPONSIVE: fila del leaderboard ── */
        .leaderboard-row {
            display: grid;
            grid-template-columns: 2.5rem 1fr;
            grid-template-rows: auto auto;
            gap: 0.25rem 0.75rem;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            background: rgba(15,23,42,0.5);
            border: 1px solid rgba(51,65,85,0.4);
            transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            margin-bottom: 0.25rem;
        }
        .leaderboard-row:hover {
            background: #1e293b;
            border-color: #475569;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }

        /* Rank badge — fila 1-2, col 1 */
        .row-rank {
            grid-column: 1;
            grid-row: 1 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Nombre — fila 1, col 2 */
        .row-name {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            min-width: 0;
        }

        /* Barra + monto — fila 2, col 2 */
        .row-progress {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        /* Desktop: todo en una sola fila */
        @media (min-width: 768px) {
            .leaderboard-row {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 1rem;
                padding: 0.875rem 1.25rem;
            }
            .row-rank   { width: 2.5rem; flex-shrink: 0; }
            .row-name   { width: 200px; flex-shrink: 0; justify-content: flex-start; }
            .row-progress { flex: 1; flex-direction: column; gap: 0.25rem; }
            .row-amount { flex-shrink: 0; text-align: right; }
            .row-amount-mobile { display: none !important; }
        }

        /* Ocultar "monto" inline en desktop cuando ya está en columna separada */
        @media (max-width: 767px) {
            .row-amount { display: none !important; }
        }

        /* Header responsive */
        .header-title { font-size: clamp(0.95rem, 3vw, 1.25rem); }
        .status-badge-text { display: none; }
        @media (min-width: 480px) {
            .status-badge-text { display: inline; }
        }
    </style>
</head>
<body class="bg-dark-bg text-slate-200 min-h-screen flex flex-col antialiased selection:bg-brand-glow selection:text-white relative overflow-x-hidden">

    <!-- Glow background -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-600/20 blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-emerald-600/20 blur-[120px] pointer-events-none z-0"></div>

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 w-full px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-3">
        <div class="flex items-center gap-2 sm:gap-3 min-w-0">
            <div class="w-9 h-9 sm:w-10 sm:h-10 flex-shrink-0 rounded-xl bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-blue-500/30">
                <i class="ph-fill ph-trophy text-white text-xl sm:text-2xl"></i>
            </div>
            <div class="min-w-0">
                <h1 class="header-title font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400 truncate">
                    Metas del Equipo
                </h1>
                <p class="text-[10px] sm:text-xs text-slate-400 font-medium tracking-wider uppercase">
                    Metas de <span id="current-month" class="text-emerald-400 font-bold">...</span>
                </p>
            </div>
        </div>
        
        <div class="flex items-center gap-2 sm:gap-4 flex-shrink-0">
            <div id="statusIndicator" class="flex items-center gap-2 text-sm text-slate-400 bg-dark-card px-2 sm:px-3 py-1.5 rounded-full border border-dark-border">
                <span class="relative flex h-2.5 w-2.5 flex-shrink-0">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </span>
                <span id="statusText" class="status-badge-text text-xs whitespace-nowrap">Conectado</span>
            </div>
            <button onclick="fetchData()" class="p-2 rounded-lg bg-dark-card border border-dark-border hover:bg-slate-700 hover:text-white transition-colors group" title="Actualizar datos">
                <i class="ph ph-arrows-clockwise text-lg sm:text-xl group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 w-full max-w-5xl mx-auto px-3 sm:px-4 py-5 sm:py-8 relative z-10">
        
        <!-- Stats cards -->
        <div class="grid grid-cols-3 gap-2 sm:gap-4 mb-5 sm:mb-8">
            <!-- Equipo -->
            <div class="bg-dark-card/80 border border-dark-border rounded-xl sm:rounded-2xl p-3 sm:p-5 backdrop-blur-sm">
                <p class="text-slate-400 text-[10px] sm:text-sm font-medium mb-1 flex items-center gap-1">
                    <i class="ph ph-users text-sm sm:text-base"></i>
                    <span class="hidden sm:inline">Equipo Total</span>
                    <span class="sm:hidden">Equipo</span>
                </p>
                <h2 id="stat-total-team" class="text-2xl sm:text-3xl font-bold text-white">0</h2>
            </div>
            <!-- Superaron meta -->
            <div class="bg-dark-card/80 border border-dark-border rounded-xl sm:rounded-2xl p-3 sm:p-5 backdrop-blur-sm relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 w-16 h-16 sm:w-20 sm:h-20 bg-emerald-500/10 rounded-full blur-xl"></div>
                <p class="text-slate-400 text-[10px] sm:text-sm font-medium mb-1 flex items-center gap-1">
                    <i class="ph ph-trend-up text-emerald-400 text-sm sm:text-base"></i>
                    <span class="hidden sm:inline">Superaron la Meta</span>
                    <span class="sm:hidden">Superaron</span>
                </p>
                <h2 id="stat-achievers" class="text-2xl sm:text-3xl font-bold text-emerald-400">0</h2>
            </div>
            <!-- Total generado -->
            <div class="bg-dark-card/80 border border-dark-border rounded-xl sm:rounded-2xl p-3 sm:p-5 backdrop-blur-sm">
                <p class="text-slate-400 text-[10px] sm:text-sm font-medium mb-1 flex items-center gap-1">
                    <i class="ph ph-currency-dollar text-sm sm:text-base"></i>
                    <span class="hidden sm:inline">Total Generado</span>
                    <span class="sm:hidden">Total</span>
                </p>
                <h2 id="stat-total-money" class="text-lg sm:text-3xl font-bold text-white">$0</h2>
            </div>
        </div>

        <!-- Leaderboard -->
        <div class="bg-dark-card/50 border border-dark-border rounded-xl sm:rounded-2xl p-1 backdrop-blur-sm shadow-2xl">
            <!-- Encabezados solo desktop -->
            <div class="hidden md:flex items-center gap-4 px-5 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider border-b border-dark-border/50">
                <div class="w-10 text-center flex-shrink-0">Pos.</div>
                <div style="width:200px" class="flex-shrink-0">Nombre</div>
                <div class="flex-1">Progreso</div>
                <div class="w-28 text-right flex-shrink-0">Alcanzado</div>
            </div>

            <div id="leaderboard-container" class="flex flex-col gap-1 p-1.5 sm:p-2">
                <div id="loading-state" class="py-12 flex flex-col items-center justify-center text-slate-500">
                    <i class="ph ph-spinner-gap animate-spin text-4xl mb-3 text-brand-glow"></i>
                    <p class="text-sm">Obteniendo datos de la nube...</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        const sheetId = '1URae8fWw5QuOLo7FdsQr2KP-OqY69GT6Xu9CFHsowXY'; 
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

        const container = document.getElementById('leaderboard-container');
        const loadingState = document.getElementById('loading-state');
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.querySelector('#statusIndicator span:first-child');
        const currentMonthElement = document.getElementById('current-month');
        
        const currencyFormatter = new Intl.NumberFormat('en-US', {
            style: 'currency', currency: 'USD', maximumFractionDigits: 0
        });

        function updateCurrentMonth() {
            const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            currentMonthElement.textContent = meses[new Date().getMonth()];
        }

        function parseNumber(val) {
            if (!val) return 0;
            let cleaned = String(val).replace(/[$€A-Za-z\s]/g, '').replace(/,/g, '');
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }
        
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                const values = lines[i].split(regex);
                const rowObject = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = values[j] ? values[j].trim().replace(/"/g, '') : '';
                    rowObject[headers[j]] = val;
                }
                data.push(rowObject);
            }
            return data;
        }

        async function fetchData() {
            setLoading(true);
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                const csvData = await response.text();
                if (csvData.trim().startsWith('<!DOCTYPE html>')) {
                    throw new Error("La hoja no está publicada como CSV.");
                }
                const rawData = parseCSV(csvData);
                processAndRenderData(rawData);
                setConnectionStatus('Conectado', true);
            } catch (error) {
                console.error("Error:", error);
                setConnectionStatus('Error', false);
                container.innerHTML = `
                    <div class="py-12 flex flex-col items-center justify-center text-red-400 px-4">
                        <i class="ph ph-warning-circle text-4xl mb-3"></i>
                        <p class="font-medium text-center">No se pudo cargar los datos.</p>
                        <p class="text-sm mt-2 opacity-70 max-w-md text-center">${error.message}</p>
                    </div>`;
            } finally {
                setLoading(false);
            }
        }

        function processAndRenderData(data) {
            const validData = data.filter(item => item.Nombre && item.Nombre.trim() !== '');
            const processedData = validData.map(item => {
                const nombre = item.Nombre || "Desconocido";
                const ventas = parseNumber(item.Progreso);
                const meta = parseNumber(item.Objetivo);
                let percentage = meta > 0 ? (ventas / meta) * 100 : 0;
                return { nombre, ventas, meta, percentage };
            });

            processedData.sort((a, b) => b.percentage - a.percentage);
            updateStats(processedData);
            container.innerHTML = '';

            if (processedData.length === 0) {
                container.innerHTML = `
                    <div class="py-12 flex flex-col items-center text-slate-500">
                        <i class="ph ph-empty text-4xl mb-3"></i>
                        <p>No hay datos disponibles.</p>
                    </div>`;
                return;
            }

            processedData.forEach((person, index) => {
                const rank = index + 1;
                const isOverGoal = person.ventas >= person.meta;
                const visualPercentage = Math.min(person.percentage, 100);

                let barColorClass = "bg-blue-500";
                let textColorClass = "text-slate-300";
                let iconHtml = "";
                let nameClass = "text-white";

                if (isOverGoal) {
                    barColorClass = "bg-gradient-to-r from-emerald-500 to-green-400";
                    textColorClass = "text-emerald-400 font-bold drop-shadow-[0_0_8px_rgba(52,211,153,0.5)]";
                    nameClass = "text-emerald-50";
                    iconHtml = `<i class="ph-fill ph-check-circle text-emerald-400" title="¡Meta Alcanzada!"></i>`;
                } else if (person.percentage >= 80) {
                    barColorClass = "bg-gradient-to-r from-yellow-500 to-amber-400";
                } else if (person.percentage <= 30) {
                    barColorClass = "bg-gradient-to-r from-rose-500 to-red-400";
                }

                // Rank badge styling
                let rankClass = 'bg-slate-800 text-slate-400 border-dark-border';
                if (rank === 1) rankClass = 'bg-amber-500/20 text-amber-400 border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.2)]';
                else if (rank === 2) rankClass = 'bg-slate-300/20 text-slate-300 border-slate-400/50';
                else if (rank === 3) rankClass = 'bg-orange-600/20 text-orange-400 border-orange-600/50';

                const faltaMonto = person.ventas < person.meta
                    ? `falta ${currencyFormatter.format(person.meta - person.ventas)}`
                    : '✓ meta cumplida';

                const rowHtml = `
                <div class="leaderboard-row">
                    <!-- Rank -->
                    <div class="row-rank">
                        <div class="flex items-center justify-center w-8 h-8 rounded-full ${rankClass} border font-bold text-sm flex-shrink-0">
                            ${rank}
                        </div>
                    </div>

                    <!-- Nombre + monto (mobile inline) -->
                    <div class="row-name min-w-0">
                        <h3 class="text-sm sm:text-base font-semibold ${nameClass} flex items-center gap-1.5 truncate">
                            <span class="truncate">${person.nombre}</span>
                            ${iconHtml}
                        </h3>
                        <!-- Monto visible solo en mobile (dentro del nombre row) -->
                        <div class="row-amount-mobile text-right flex-shrink-0 ml-2">
                            <div class="text-sm font-bold ${isOverGoal ? 'text-emerald-400' : 'text-white'} whitespace-nowrap">
                                ${currencyFormatter.format(person.ventas)}
                            </div>
                            <div class="text-[10px] text-slate-500 whitespace-nowrap">${faltaMonto}</div>
                        </div>
                    </div>

                    <!-- Barra de progreso -->
                    <div class="row-progress">
                        <div class="flex justify-between items-end">
                            <span class="text-xs font-bold ${textColorClass}">
                                ${person.percentage.toFixed(1)}%
                            </span>
                            <span class="text-[10px] text-slate-500 hidden sm:inline">
                                Meta: ${currencyFormatter.format(person.meta)}
                            </span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden border border-slate-700/50 relative">
                            <div class="progress-bar-fill h-full rounded-full ${barColorClass} relative"
                                 style="width: 0%;"
                                 data-width="${visualPercentage}%">
                                ${isOverGoal ? '<div class="absolute inset-0 bg-white/20 animate-pulse-slow"></div>' : ''}
                            </div>
                        </div>
                        <div class="text-[10px] text-slate-500 sm:hidden">
                            Meta: ${currencyFormatter.format(person.meta)}
                        </div>
                    </div>

                    <!-- Monto columna (solo desktop) -->
                    <div class="row-amount w-28 text-right flex-shrink-0">
                        <div class="font-bold ${isOverGoal ? 'text-emerald-400' : 'text-white'}">
                            ${currencyFormatter.format(person.ventas)}
                        </div>
                        <div class="text-[10px] text-slate-500">${faltaMonto}</div>
                    </div>
                </div>`;

                container.insertAdjacentHTML('beforeend', rowHtml);
            });

            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-width');
                    });
                }, 100);
            });
        }

        function updateStats(data) {
            document.getElementById('stat-total-team').innerText = data.length;
            document.getElementById('stat-achievers').innerText = data.filter(p => p.ventas >= p.meta).length;
            document.getElementById('stat-total-money').innerText = currencyFormatter.format(data.reduce((s, p) => s + p.ventas, 0));
        }

        function setLoading(isLoading) {
            loadingState.style.display = isLoading ? 'flex' : 'none';
        }

        function setConnectionStatus(text, isOk) {
            statusText.innerText = text;
            statusIndicator.innerHTML = isOk
                ? `<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                   <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>`
                : `<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>`;
        }

        window.onload = () => {
            updateCurrentMonth();
            fetchData();
        };
    </script>
</body>
</html>
